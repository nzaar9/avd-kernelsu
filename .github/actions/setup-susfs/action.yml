name: Setup SUSFS
description: 'Clone and apply SUSFS patches to kernel with version-specific fixes'

inputs:
  android_version:
    description: 'Android version (e.g., android15)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true
  sublevel:
    description: 'Kernel sublevel'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-07)'
    required: true
  susfs_commit:
    description: 'Commit map (branch:commit,branch:commit...)'
    required: false

runs:
  using: composite
  steps:
    - name: Clone SUSFS
      shell: bash
      run: |
        SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
        SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"

        echo "Preparing SUSFS for branch: $SUSFS_BRANCH"

        # Parse commit map to find the commit for this branch
        COMMIT_MAP="${{ inputs.susfs_commit }}"
        TARGET_COMMIT=""

        if [ -n "$COMMIT_MAP" ]; then
          IFS=',' read -ra ENTRIES <<< "$COMMIT_MAP"
          for entry in "${ENTRIES[@]}"; do
            IFS=':' read -r branch commit <<< "$entry"
            if [ "$branch" == "$SUSFS_BRANCH" ]; then
              TARGET_COMMIT="$commit"
              break
            fi
          done
        fi

        if [ -n "$TARGET_COMMIT" ]; then
          echo "Found specific commit for $SUSFS_BRANCH: $TARGET_COMMIT"
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" susfs4ksu
          cd susfs4ksu && git checkout "$TARGET_COMMIT" && cd ..
        else
          echo "Cloning latest $SUSFS_BRANCH..."
          git clone "$SUSFS_REPO" -b "$SUSFS_BRANCH" --depth=1 susfs4ksu
        fi

        SUSFS_VERSION="2.0.0"
        echo "SUSFS_VERSION=$SUSFS_VERSION" >> $GITHUB_ENV

    - name: Clone SUSFS Fix Patches
      shell: bash
      run: |
        echo "Cloning WildKernels kernel_patches for SUSFS fixes..."
        git clone --depth=1 https://github.com/WildKernels/kernel_patches.git "${{ github.workspace }}/kernel_patches"

    - name: Enable SUSFS Kernel Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/gki.fragment" << 'EOF'
        # SUSFS Configuration
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_MAP=y
        EOF

    - name: Apply Base SUSFS Patches
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        # Copy SUSFS kernel source files
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/fs/"* fs/
        cp "${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/"* include/linux/

        # Apply the kernel integration patch
        PATCH_FILE="${{ github.workspace }}/susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch"
        if [ -f "$PATCH_FILE" ]; then
          cp "$PATCH_FILE" ./
          patch -p1 < "$(basename "$PATCH_FILE")" || true
        else
          echo "WARNING: SUSFS patch not found: $PATCH_FILE"
          echo "Available patches:"
          ls -la "${{ github.workspace }}/susfs4ksu/kernel_patches/"
        fi

        # Apply KernelSU-Next SUSFS enablement patch
        KSU_PATCH="${{ github.workspace }}/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
        if [ -f "$KSU_PATCH" ]; then
          cd "${{ github.workspace }}/kernel/KernelSU-Next"
          patch -p1 < "$KSU_PATCH" || true
        fi

    - name: Apply KernelSU-Next SUSFS Fix Patches
      shell: bash
      run: |
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}
        KSU_FIX_DIR="${{ github.workspace }}/kernel_patches/next/susfs_fix_patches/v${SUSFS_VERSION}"

        if [ -d "$KSU_FIX_DIR" ]; then
          cd "${{ github.workspace }}/kernel/KernelSU-Next"
          echo "Applying KernelSU-Next SUSFS fix patches from $KSU_FIX_DIR..."
          for patch_file in "$KSU_FIX_DIR"/fix_*.patch; do
            [ -f "$patch_file" ] || continue
            echo "Applying $(basename "$patch_file")..."
            patch -p1 < "$patch_file" || true
          done
        else
          echo "No KernelSU-Next SUSFS fix patches found at $KSU_FIX_DIR"
        fi

    - name: Apply SUSFS Fix Patches (Android 14 - 6.1)
      if: ${{ inputs.android_version == 'android14' && inputs.kernel_version == '6.1' }}
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        SUBLEVEL=${{ inputs.sublevel }}
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}
        PATCH_DIR="${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a14-6.1"

        # base.c.patch - adds missing #include <linux/susfs_def.h> to fs/proc/base.c
        if [ -f "$PATCH_DIR/base.c.patch" ]; then
          echo "Applying base.c.patch fix for a14-6.1..."
          cp "$PATCH_DIR/base.c.patch" ./
          patch -p1 < base.c.patch || true
        fi

        # Fix task_mmu for older sublevels
        if [[ "$SUBLEVEL" -le 75 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
          echo "Applying task_mmu fix for sublevel <= 75..."
          sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
        fi

    - name: Apply SUSFS Fix Patches (Android 15 - 6.6)
      if: ${{ inputs.android_version == 'android15' && inputs.kernel_version == '6.6' }}
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        SUBLEVEL=${{ inputs.sublevel }}
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}
        PATCH_DIR="${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a15-6.6"

        # base.c.patch - adds missing #include <linux/susfs_def.h> to fs/proc/base.c
        if [[ "$SUBLEVEL" -le 92 ]] && [ -f "$PATCH_DIR/base.c.patch" ]; then
          echo "Applying base.c.patch fix for a15-6.6 (sublevel <= 92)..."
          cp "$PATCH_DIR/base.c.patch" ./
          patch -p1 < base.c.patch || true
        fi

        # task_mmu.c.patch
        if [[ "$SUBLEVEL" -le 58 ]] && [ -f "$PATCH_DIR/task_mmu.c.patch" ]; then
          echo "Applying task_mmu.c.patch fix for a15-6.6 (sublevel <= 58)..."
          cp "$PATCH_DIR/task_mmu.c.patch" ./
          patch -p1 < task_mmu.c.patch || true
        fi

    - name: Apply SUSFS Fix Patches (Android 16 - 6.12)
      if: ${{ inputs.android_version == 'android16' && inputs.kernel_version == '6.12' }}
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        SUSFS_VERSION=${{ env.SUSFS_VERSION }}
        PATCH_DIR="${{ github.workspace }}/kernel_patches/wild/susfs_fix_patches/v${SUSFS_VERSION}/a16-6.12"

        # Apply any available fix patches for a16-6.12
        if [ -d "$PATCH_DIR" ]; then
          for patch_file in "$PATCH_DIR"/*.patch; do
            [ -f "$patch_file" ] || continue
            echo "Applying $(basename "$patch_file") fix for a16-6.12..."
            cp "$patch_file" ./
            patch -p1 < "$(basename "$patch_file")" || true
          done
        else
          echo "No fix patches available for a16-6.12 yet - attempting build without fixes"
          # For a16-6.12, manually add the include if missing (common fix)
          if grep -q 'AS_FLAGS_SUS_MAP' fs/proc/base.c 2>/dev/null; then
            if ! grep -q 'susfs_def.h' fs/proc/base.c 2>/dev/null; then
              echo "Adding missing susfs_def.h include to fs/proc/base.c..."
              sed -i '/#include "internal.h"/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux\/susfs_def.h>\n#endif' fs/proc/base.c
            fi
          fi
        fi
