name: 'Configure Kernel Options'
description: 'Force virtio drivers built-in for AVD compatibility'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Force virtio drivers built-in for AVD
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "Forcing virtio drivers as built-in for AVD boot..."

        # Instead of modifying defconfigs (which breaks Bazel savedefconfig check),
        # change Kconfig defaults so virtio drivers are built-in by default.
        # This way the generated defconfig naturally includes them as =y.

        # Helper: change a Kconfig option from tristate to bool (forces built-in)
        force_builtin() {
          local kconfig="$1"
          local config="$2"
          if [ -f "$kconfig" ]; then
            # Change tristate to bool for this config
            sed -i "/^config ${config}$/,/^config \|^endmenu\|^end/{s/^\(\s*\)tristate/\1bool/;}" "$kconfig" 2>/dev/null || true
          fi
        }

        # Force critical virtio drivers from tristate (=m possible) to bool (=y or =n only)
        force_builtin drivers/virtio/Kconfig VIRTIO
        force_builtin drivers/virtio/Kconfig VIRTIO_PCI
        force_builtin drivers/virtio/Kconfig VIRTIO_PCI_LEGACY
        force_builtin drivers/virtio/Kconfig VIRTIO_BALLOON
        force_builtin drivers/virtio/Kconfig VIRTIO_INPUT
        force_builtin drivers/virtio/Kconfig VIRTIO_MMIO
        force_builtin drivers/block/Kconfig VIRTIO_BLK
        force_builtin drivers/net/Kconfig VIRTIO_NET
        force_builtin drivers/char/Kconfig VIRTIO_CONSOLE
        force_builtin drivers/vhost/Kconfig VIRTIO_VSOCKETS
        force_builtin drivers/net/virtio_net.c DUMMY_SKIP  # no-op, just in case

        # Also handle virtio_dma_buf which is loaded as module
        force_builtin drivers/dma-buf/Kconfig VIRTIO_DMA_SHARED_BUFFER
        # Try alternate location
        force_builtin drivers/virtio/Kconfig VIRTIO_DMA_SHARED_BUFFER

        # Also update defconfig files so savedefconfig check passes
        # Change =m to =y for virtio configs, and remove entries that become default
        for defconfig in $(find arch/ -name "gki_defconfig" -o -name "gki.fragment" 2>/dev/null); do
          echo "Updating $defconfig..."
          sed -i 's/CONFIG_VIRTIO=m/CONFIG_VIRTIO=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_PCI=m/CONFIG_VIRTIO_PCI=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_PCI_LEGACY=m/CONFIG_VIRTIO_PCI_LEGACY=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_BALLOON=m/CONFIG_VIRTIO_BALLOON=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_INPUT=m/CONFIG_VIRTIO_INPUT=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_MMIO=m/CONFIG_VIRTIO_MMIO=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_BLK=m/CONFIG_VIRTIO_BLK=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_NET=m/CONFIG_VIRTIO_NET=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_CONSOLE=m/CONFIG_VIRTIO_CONSOLE=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_VSOCKETS=m/CONFIG_VIRTIO_VSOCKETS=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_DMA_SHARED_BUFFER=m/CONFIG_VIRTIO_DMA_SHARED_BUFFER=y/' "$defconfig"
          sed -i 's/CONFIG_DRM_VIRTIO_GPU=m/CONFIG_DRM_VIRTIO_GPU=y/' "$defconfig"
          sed -i 's/CONFIG_HW_RANDOM_VIRTIO=m/CONFIG_HW_RANDOM_VIRTIO=y/' "$defconfig"
          sed -i 's/CONFIG_SCSI_VIRTIO=m/CONFIG_SCSI_VIRTIO=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_PCI_MODERN_DEV=m/CONFIG_VIRTIO_PCI_MODERN_DEV=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_PCI_LEGACY_DEV=m/CONFIG_VIRTIO_PCI_LEGACY_DEV=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_SND=m/CONFIG_VIRTIO_SND=y/' "$defconfig"
          sed -i 's/CONFIG_VIRTIO_PMEM=m/CONFIG_VIRTIO_PMEM=y/' "$defconfig"
          # Also handle goldfish drivers
          sed -i 's/CONFIG_GOLDFISH_PIPE=m/CONFIG_GOLDFISH_PIPE=y/' "$defconfig"
          sed -i 's/CONFIG_GOLDFISH=m/CONFIG_GOLDFISH=y/' "$defconfig"
        done

        echo "Virtio Kconfig entries changed from tristate to bool (forces built-in)"
        echo "Defconfig files updated to match (=m -> =y)"
