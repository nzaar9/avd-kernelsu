name: 'Configure Kernel Options'
description: 'No extra config needed - modules are repacked into ramdisk'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Skip - modules will be repacked into ramdisk
      shell: bash
      run: echo "Using default GKI config. Matching modules will be repacked into ramdisk."
