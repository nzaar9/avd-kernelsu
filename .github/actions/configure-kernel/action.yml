name: 'Configure Kernel Options'
description: 'Force all AVD modules built-in for compatibility'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Force all modules built-in for AVD
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        echo "=== Forcing ALL modules as built-in for AVD ==="

        # Comprehensive list of ALL modules from AVD virtual device build
        # Changing =m to =y in ALL defconfigs ensures savedefconfig matches
        MODULE_CONFIGS=(
          # Virtio (boot critical)
          CONFIG_VIRTIO
          CONFIG_VIRTIO_PCI
          CONFIG_VIRTIO_PCI_LEGACY
          CONFIG_VIRTIO_PCI_MODERN_DEV
          CONFIG_VIRTIO_PCI_LEGACY_DEV
          CONFIG_VIRTIO_BLK
          CONFIG_VIRTIO_NET
          CONFIG_VIRTIO_CONSOLE
          CONFIG_VIRTIO_BALLOON
          CONFIG_VIRTIO_INPUT
          CONFIG_VIRTIO_MMIO
          CONFIG_VIRTIO_DMA_SHARED_BUFFER
          CONFIG_VIRTIO_PMEM
          CONFIG_VIRTIO_SND
          CONFIG_VIRTIO_VIDEO
          CONFIG_VIRTIO_VSOCKETS
          CONFIG_HW_RANDOM_VIRTIO
          CONFIG_SCSI_VIRTIO
          CONFIG_DRM_VIRTIO_GPU
          CONFIG_VIRTIO_RNG
          # Goldfish (emulator hardware)
          CONFIG_GOLDFISH
          CONFIG_GOLDFISH_PIPE
          CONFIG_GOLDFISH_ADDRESS_SPACE
          CONFIG_GOLDFISH_BATTERY
          CONFIG_GOLDFISH_SYNC
          # WiFi/Networking
          CONFIG_CFG80211
          CONFIG_MAC80211
          CONFIG_MAC80211_HWSIM
          CONFIG_VIRT_WIFI
          CONFIG_FAILOVER
          CONFIG_NET_FAILOVER
          CONFIG_ND_VIRTIO
          # Bluetooth
          CONFIG_BT_INTEL
          CONFIG_BT_RTL
          CONFIG_BT_HCIBTUSB
          CONFIG_BT_HCIVHCI
          # USB
          CONFIG_USB_DUMMY_HCD
          CONFIG_USBIP_CORE
          CONFIG_USBIP_VHCI_HCD
          CONFIG_USB_CONFIGFS_F_UVC
          # GPU/Display
          CONFIG_DRM_VKMS
          CONFIG_CEC_PULSE8
          # Media
          CONFIG_VIDEO_V4L2_LOOPBACK
          # Sound
          CONFIG_SND_USB_AUDIO
          # Block/Storage
          CONFIG_DMABUF_HEAPS_SYSTEM
          # Other
          CONFIG_DUMMY_CPUFREQ
          CONFIG_RTC_DRV_TEST
          CONFIG_TEST_MEMINIT
          # MT76 WiFi
          CONFIG_MT76_USB
          CONFIG_MT76x0U
          CONFIG_MT76x2U
          CONFIG_MT76_CORE
          CONFIG_MT76x02_LIB
          CONFIG_MT76x02_USB
          CONFIG_MT76x0_COMMON
          CONFIG_MT76x2_COMMON
          # CAN
          CONFIG_CAN_GS_USB
          # VMW vsock
          CONFIG_VMW_VSOCK_VIRTIO_TRANSPORT
          CONFIG_VSOCKETS
          # VHOST
          CONFIG_VHOST_VSOCK
        )

        # Step 1: Change =m to =y in ALL defconfig files
        echo "--- Updating defconfig files (=m -> =y) ---"
        for defconfig in $(find arch/ -name "gki_defconfig" 2>/dev/null); do
          echo "Patching $defconfig"
          for cfg in "${MODULE_CONFIGS[@]}"; do
            sed -i "s/${cfg}=m/${cfg}=y/" "$defconfig"
          done
        done

        # Step 2: Change tristate to bool in Kconfig for boot-critical drivers
        echo "--- Patching Kconfig (tristate -> bool) for boot-critical drivers ---"
        CRITICAL_CONFIGS=(
          VIRTIO VIRTIO_PCI VIRTIO_BLK VIRTIO_NET VIRTIO_CONSOLE
          VIRTIO_BALLOON VIRTIO_INPUT VIRTIO_MMIO VIRTIO_PCI_LEGACY
          VIRTIO_DMA_SHARED_BUFFER GOLDFISH_PIPE
        )
        for cfg in "${CRITICAL_CONFIGS[@]}"; do
          find drivers/ -name Kconfig -exec sed -i "/^config ${cfg}$/,/^config \|^endmenu\|^end/{s/^\(\s*\)tristate/\1bool/;}" {} \; 2>/dev/null
        done

        echo "=== All modules forced built-in ==="
