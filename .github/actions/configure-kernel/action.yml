name: 'Configure Kernel Options'
description: 'Force all AVD modules built-in for compatibility'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Force all modules built-in for AVD
      shell: bash
      run: |
        echo "=== Forcing ALL modules as built-in via gki.fragment ==="

        # Write virtio and AVD configs to the fragment file
        # These override =m to =y in the final config
        cat >> "${{ github.workspace }}/gki.fragment" << 'FRAGMENT'
        # Virtio drivers (boot critical for AVD)
        CONFIG_VIRTIO=y
        CONFIG_VIRTIO_PCI=y
        CONFIG_VIRTIO_PCI_LEGACY=y
        CONFIG_VIRTIO_BLK=y
        CONFIG_VIRTIO_NET=y
        CONFIG_VIRTIO_CONSOLE=y
        CONFIG_VIRTIO_BALLOON=y
        CONFIG_VIRTIO_INPUT=y
        CONFIG_VIRTIO_MMIO=y
        CONFIG_VIRTIO_DMA_SHARED_BUFFER=y
        CONFIG_HW_RANDOM_VIRTIO=y
        CONFIG_SCSI_VIRTIO=y
        CONFIG_DRM_VIRTIO_GPU=y
        CONFIG_VIRTIO_SND=y
        CONFIG_VIRTIO_VSOCKETS=y
        # Goldfish (emulator)
        CONFIG_GOLDFISH_PIPE=y
        CONFIG_GOLDFISH_ADDRESS_SPACE=y
        # Networking
        CONFIG_FAILOVER=y
        CONFIG_NET_FAILOVER=y
        FRAGMENT

        # Also patch Kconfig to change tristate->bool so Bazel config check accepts =y
        cd "${{ github.workspace }}/kernel/common"

        # Change VIRTIO_BLK and other critical drivers from tristate to bool
        for cfg in VIRTIO_BLK VIRTIO_NET VIRTIO_CONSOLE VIRTIO_PCI VIRTIO VIRTIO_BALLOON VIRTIO_INPUT VIRTIO_MMIO; do
          find drivers/ -name Kconfig -exec sed -i "/^config ${cfg}$/,/^config \|^endmenu\|^end/{s/^\(\s*\)tristate/\1bool/;}" {} \; 2>/dev/null
        done

        # Also update the gki_defconfig to match (=m -> =y)
        find arch/ -name "gki_defconfig" -exec sed -i \
          -e 's/CONFIG_VIRTIO=m/CONFIG_VIRTIO=y/' \
          -e 's/CONFIG_VIRTIO_PCI=m/CONFIG_VIRTIO_PCI=y/' \
          -e 's/CONFIG_VIRTIO_PCI_LEGACY=m/CONFIG_VIRTIO_PCI_LEGACY=y/' \
          -e 's/CONFIG_VIRTIO_BLK=m/CONFIG_VIRTIO_BLK=y/' \
          -e 's/CONFIG_VIRTIO_NET=m/CONFIG_VIRTIO_NET=y/' \
          -e 's/CONFIG_VIRTIO_CONSOLE=m/CONFIG_VIRTIO_CONSOLE=y/' \
          -e 's/CONFIG_VIRTIO_BALLOON=m/CONFIG_VIRTIO_BALLOON=y/' \
          -e 's/CONFIG_VIRTIO_INPUT=m/CONFIG_VIRTIO_INPUT=y/' \
          -e 's/CONFIG_VIRTIO_MMIO=m/CONFIG_VIRTIO_MMIO=y/' \
          -e 's/CONFIG_VIRTIO_DMA_SHARED_BUFFER=m/CONFIG_VIRTIO_DMA_SHARED_BUFFER=y/' \
          -e 's/CONFIG_HW_RANDOM_VIRTIO=m/CONFIG_HW_RANDOM_VIRTIO=y/' \
          -e 's/CONFIG_SCSI_VIRTIO=m/CONFIG_SCSI_VIRTIO=y/' \
          -e 's/CONFIG_DRM_VIRTIO_GPU=m/CONFIG_DRM_VIRTIO_GPU=y/' \
          -e 's/CONFIG_VIRTIO_SND=m/CONFIG_VIRTIO_SND=y/' \
          -e 's/CONFIG_GOLDFISH_PIPE=m/CONFIG_GOLDFISH_PIPE=y/' \
          -e 's/CONFIG_GOLDFISH_ADDRESS_SPACE=m/CONFIG_GOLDFISH_ADDRESS_SPACE=y/' \
          -e 's/CONFIG_FAILOVER=m/CONFIG_FAILOVER=y/' \
          -e 's/CONFIG_NET_FAILOVER=m/CONFIG_NET_FAILOVER=y/' \
          {} \;

        # Debug: show what's in the fragment
        echo "--- gki.fragment contents ---"
        cat "${{ github.workspace }}/gki.fragment"
        echo "--- end fragment ---"

        echo "=== Done ==="
