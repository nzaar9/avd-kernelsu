name: 'Configure Kernel Options'
description: 'Set up kernel configuration fragment with KernelSU options'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Apply Kernel Configuration
      shell: bash
      run: |
        # Only append configs that are known to exist in GKI Kconfig
        # The GKI kernel already has networking defaults; avoid adding
        # configs that may not exist and cause strict Bazel config checks to fail
        echo "Using default GKI kernel configuration (no extra fragment overrides)"
