name: 'Clean Kernel Flags'
description: 'Clean dirty flags and ABI exports to prevent build errors'

runs:
  using: composite
  steps:
    - name: Clean Dirty Flags and ABI Exports
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        if [ -f "build/build.sh" ]; then
          # Old build system (5.10, 5.15, early 6.1)
          sed -i 's/-dirty//' ./common/scripts/setlocalversion
        else
          # Bazel build system (newer kernels)
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i 's/-dirty//' ./common/scripts/setlocalversion
          # Remove ABI protected exports to prevent build errors with custom patches
          rm -rf ./common/android/abi_gki_protected_exports_*
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' ./common/BUILD.bazel 2>/dev/null || true
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_x86_64",\s*$//;' ./common/BUILD.bazel 2>/dev/null || true

          # Remove rust_binder.ko from module_outs (Android 16 lists it but it requires Rust toolchain)
          sed -i '/"drivers\/android\/binder\/rust_binder\.ko"/d' ./common/BUILD.bazel 2>/dev/null || true
        fi

        cd ${{ github.workspace }}/kernel/common
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Clean dirty flags and ABI exports" || true
