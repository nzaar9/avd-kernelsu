name: 'Clean Kernel Flags'
description: 'Clean dirty flags and ABI exports to prevent build errors'

runs:
  using: composite
  steps:
    - name: Clean Dirty Flags and ABI Exports
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        if [ -f "build/build.sh" ]; then
          # Old build system (5.10, 5.15, early 6.1)
          sed -i 's/-dirty//' ./common/scripts/setlocalversion
        else
          # Bazel build system (newer kernels)
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i 's/-dirty//' ./common/scripts/setlocalversion
          # Remove ABI protected exports to prevent build errors with custom patches
          rm -rf ./common/android/abi_gki_protected_exports_*
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' ./common/BUILD.bazel 2>/dev/null || true
          perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_x86_64",\s*$//;' ./common/BUILD.bazel 2>/dev/null || true

          # Remove rust_binder.ko from module_outs (Android 16 lists it but it requires Rust toolchain)
          find . -type f \( -name "*.bazel" -o -name "*.bzl" -o -name "BUILD" \) -exec grep -l "rust_binder" {} \; -exec sed -i '/rust_binder/d' {} \;

          # Disable KMI symbol list strict mode (KernelSU patches change exported symbols)
          find . -type f \( -name "*.bazel" -o -name "*.bzl" -o -name "BUILD" \) -exec sed -i 's/kmi_symbol_list_strict_mode\s*=\s*True/kmi_symbol_list_strict_mode = False/g' {} \;

          # Disable defconfig savedefconfig check (our Kconfig changes cause mismatch)
          find . -type f \( -name "*.bazel" -o -name "*.bzl" \) -exec sed -i 's/defconfig_check\s*=\s*True/defconfig_check = False/g' {} \;
          # Also handle the trim_nonlisted_kmi check
          find . -type f \( -name "*.bazel" -o -name "*.bzl" \) -exec sed -i 's/trim_nonlisted_kmi\s*=\s*True/trim_nonlisted_kmi = False/g' {} \;

          # Disable savedefconfig check in Kleaf build system itself
          # The check is in kernel_config.bzl or similar - make it always pass
          find ./build -type f -name "*.bzl" -exec grep -l "savedefconfig" {} \; -exec sed -i 's/if savedefconfig_check/if False and savedefconfig_check/g; s/"savedefconfig does not match/"# savedefconfig check disabled: /g' {} \;
          # Alternative: just remove the diff check entirely
          find ./build -type f -name "*.py" -name "*.bzl" -exec sed -i '/savedefconfig/s/^/#/' {} \; 2>/dev/null || true
          # Nuclear option: patch the check script to always exit 0
          find ./build -type f -name "check_defconfig.py" -exec sh -c 'echo "import sys; sys.exit(0)" > {}' \; 2>/dev/null || true
        fi

        cd ${{ github.workspace }}/kernel/common
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Clean dirty flags and ABI exports" || true
