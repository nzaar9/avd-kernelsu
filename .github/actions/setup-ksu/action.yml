name: Setup KernelSU-Next
description: 'Download and configure KernelSU-Next'

inputs:
  ksu_commit:
    description: 'KernelSU-Next commit or tag'
    required: false

runs:
  using: composite
  steps:
    - name: Download KernelSU-Next
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ inputs.ksu_commit }}

    - name: Enable KernelSU Config
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/gki.fragment" << 'EOF'
        CONFIG_KSU=y
        EOF

    - name: Extract KSU Version Info
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null || echo "0")
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "unknown")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")

        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_GIT_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
