name: Build AVD Kernels with KernelSU-Next + SUSFS

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_build_version:
        description: 'Kernel version to build'
        type: choice
        options:
          - all
          - a14-6-1
          - a15-6-6
          - a16-6-12
        default: a14-6-1
      arch:
        description: 'Target architecture'
        type: choice
        options:
          - x86_64
          - aarch64
          - both
        default: both
      enable_susfs:
        description: 'Enable SUSFS patches'
        type: boolean
        default: true
      build_modules:
        description: 'Build virtual device modules (for AVD)'
        type: boolean
        default: true
      ksu_commit:
        description: 'KernelSU-Next commit/tag (blank = latest)'
        type: string
        default: ''
        required: false
      release_type:
        description: 'Release type'
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────
  # Fetch latest commits from upstream repos
  # ──────────────────────────────────────────────
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.commits.outputs.ksu_commit }}
      susfs_commit: ${{ steps.commits.outputs.susfs_commit }}
    steps:
      - name: Fetch Latest Commits
        id: commits
        run: |
          get_commit() {
            git ls-remote "$1" "$2" | awk '{print $1}'
          }

          # Wild KSU (KernelSU-Next with SUSFS pre-integrated)
          if [ -n "${{ inputs.ksu_commit }}" ]; then
            resolved=$(get_commit "https://github.com/WildKernels/Wild_KSU.git" "${{ inputs.ksu_commit }}")
            if [ -n "$resolved" ]; then
              ksu_commit="$resolved"
            else
              ksu_commit="${{ inputs.ksu_commit }}"
            fi
          else
            ksu_commit=$(get_commit "https://github.com/WildKernels/Wild_KSU.git" "refs/heads/stable")
          fi
          echo "Wild KSU: $ksu_commit"
          echo "ksu_commit=$ksu_commit" >> $GITHUB_OUTPUT

          # SUSFS - fetch all relevant branches
          SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
          BRANCHES=(
            "gki-android14-6.1"
            "gki-android15-6.6"
            "gki-android16-6.12"
          )

          SUSFS_MAP=""
          for branch in "${BRANCHES[@]}"; do
            COMMIT=$(get_commit "$SUSFS_REPO" "refs/heads/$branch")
            if [ -n "$COMMIT" ]; then
              echo "  $branch: $COMMIT"
              [ -z "$SUSFS_MAP" ] && SUSFS_MAP="$branch:$COMMIT" || SUSFS_MAP="$SUSFS_MAP,$branch:$COMMIT"
            fi
          done
          echo "susfs_commit=$SUSFS_MAP" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Android 14 - Kernel 6.1 (x86_64)
  # ──────────────────────────────────────────────
  build-a14-6-1-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-6-1' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      arch: x86_64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 14 - Kernel 6.1 (aarch64)
  build-a14-6-1-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-6-1' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      arch: aarch64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Android 15 - Kernel 6.6 (x86_64)
  # ──────────────────────────────────────────────
  build-a15-6-6-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a15-6-6' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      arch: x86_64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 15 - Kernel 6.6 (aarch64)
  build-a15-6-6-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a15-6-6' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      arch: aarch64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Android 16 - Kernel 6.12 (x86_64)
  # ──────────────────────────────────────────────
  build-a16-6-12-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a16-6-12' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      arch: x86_64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 16 - Kernel 6.12 (aarch64)
  build-a16-6-12-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a16-6-12' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      arch: aarch64
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs || true }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions') || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    needs:
      - build-a14-6-1-x86_64
      - build-a14-6-1-aarch64
      - build-a15-6-6-x86_64
      - build-a15-6-6-aarch64
      - build-a16-6-12-x86_64
      - build-a16-6-12-aarch64

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
          [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]] && LATEST_TAG="v0.0.0"

          if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            REV="${BASH_REMATCH[2]}"
            NEW_TAG="${VERSION}-r$((REV + 1))"
          else
            NEW_TAG="${LATEST_TAG}-r1"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Resolve Release Tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
          merge-multiple: false

      - name: Package Release Zips
        run: |
          mkdir -p release-assets
          for dir in ./downloaded-artifacts/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            (cd "$dir" && zip -r -q -9 "../../release-assets/${name}.zip" .)
          done

      - name: Set Release Body
        run: |
          cat << 'EOF' > release_body.md
          ## AVD Kernels with KernelSU-Next + SUSFS

          Custom GKI kernels built for Android Virtual Device (AVD) with:
          - **KernelSU-Next** — Advanced kernel-based root solution
          - **SUSFS** — Root hiding kernel patches (v2.0.0)
          - **BBRv1** TCP congestion control
          - **IPSet** support for network filtering
          - Virtual device modules included for AVD compatibility

          ### Architectures
          - `x86_64` — For standard AVD emulator on PC
          - `aarch64` — For ARM-based AVD or physical devices

          ### Usage (AVD)
          ```bash
          emulator @<avd-name> -kernel <path-to-bzImage-or-Image> -no-snapshot-load -show-kernel -writable-system
          ```

          ### Manager
          - KernelSU-Next: https://github.com/KernelSU-Next/KernelSU-Next

          ### SUSFS Module
          - https://github.com/sidex15/ksu_module_susfs
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type == 'Pre-Release' }}
          files: release-assets/*.zip
