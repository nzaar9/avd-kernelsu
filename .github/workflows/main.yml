name: Build AVD Kernels with KernelSU

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant'
        type: choice
        options:
          - KernelSU
          - KernelSU-Next
          - SukiSU-Ultra
        default: KernelSU-Next
      kernel_build_version:
        description: 'Kernel version to build'
        type: choice
        options:
          - all
          - a14-6-1
          - a15-6-6
          - a16-6-12
        default: a14-6-1
      arch:
        description: 'Target architecture'
        type: choice
        options:
          - x86_64
          - aarch64
          - both
        default: both
      build_modules:
        description: 'Build virtual device modules (for AVD)'
        type: boolean
        default: true
      ksu_commit:
        description: 'KSU commit/tag override (blank = latest)'
        type: string
        default: ''
        required: false
      release_type:
        description: 'Release type'
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────
  # Fetch latest commits from upstream repos
  # ──────────────────────────────────────────────
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.commits.outputs.ksu_commit }}
      ksu_variant: ${{ steps.commits.outputs.ksu_variant }}
    steps:
      - name: Fetch Latest Commits
        id: commits
        run: |
          VARIANT="${{ inputs.ksu_variant || 'KernelSU-Next' }}"
          echo "ksu_variant=$VARIANT" >> $GITHUB_OUTPUT

          get_commit() {
            git ls-remote "$1" "$2" | awk '{print $1}'
          }

          case "$VARIANT" in
            KernelSU)
              REPO_URL="https://github.com/tiann/KernelSU.git"
              DEFAULT_REF="refs/heads/main"
              ;;
            KernelSU-Next)
              REPO_URL="https://github.com/KernelSU-Next/KernelSU-Next.git"
              DEFAULT_REF="refs/heads/next"
              ;;
            SukiSU-Ultra)
              REPO_URL="https://github.com/SukiSU-Ultra/SukiSU-Ultra.git"
              DEFAULT_REF="refs/heads/main"
              ;;
          esac

          if [ -n "${{ inputs.ksu_commit }}" ]; then
            resolved=$(get_commit "$REPO_URL" "${{ inputs.ksu_commit }}")
            if [ -n "$resolved" ]; then
              ksu_commit="$resolved"
            else
              ksu_commit="${{ inputs.ksu_commit }}"
            fi
          else
            ksu_commit=$(get_commit "$REPO_URL" "$DEFAULT_REF")
          fi
          echo "$VARIANT: $ksu_commit"
          echo "ksu_commit=$ksu_commit" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Android 14 - Kernel 6.1 (x86_64)
  # ──────────────────────────────────────────────
  build-a14-6-1-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-6-1' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      arch: x86_64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 14 - Kernel 6.1 (aarch64)
  build-a14-6-1-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a14-6-1' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a14-6.1.json
      arch: aarch64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Android 15 - Kernel 6.6 (x86_64)
  # ──────────────────────────────────────────────
  build-a15-6-6-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a15-6-6' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      arch: x86_64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 15 - Kernel 6.6 (aarch64)
  build-a15-6-6-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a15-6-6' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a15-6.6.json
      arch: aarch64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Android 16 - Kernel 6.12 (x86_64)
  # ──────────────────────────────────────────────
  build-a16-6-12-x86_64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a16-6-12' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'x86_64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      arch: x86_64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # Android 16 - Kernel 6.12 (aarch64)
  build-a16-6-12-aarch64:
    if: ${{ (inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'a16-6-12' || startsWith(github.ref, 'refs/tags/v')) && (inputs.arch == 'both' || inputs.arch == 'aarch64') }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/a16-6.12.json
      arch: aarch64
      ksu_variant: ${{ needs.fetch-commits.outputs.ksu_variant }}
      ksu_commit: ${{ needs.fetch-commits.outputs.ksu_commit }}
      build_modules: ${{ inputs.build_modules || true }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # Release
  # ──────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions') || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    needs:
      - fetch-commits
      - build-a14-6-1-x86_64
      - build-a14-6-1-aarch64
      - build-a15-6-6-x86_64
      - build-a15-6-6-aarch64
      - build-a16-6-12-x86_64
      - build-a16-6-12-aarch64

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
          [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]] && LATEST_TAG="v0.0.0"

          if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            REV="${BASH_REMATCH[2]}"
            NEW_TAG="${VERSION}-r$((REV + 1))"
          else
            NEW_TAG="${LATEST_TAG}-r1"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Resolve Release Tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.tag.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts
          merge-multiple: false

      - name: Package Release Zips
        run: |
          mkdir -p release-assets
          for dir in ./downloaded-artifacts/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            (cd "$dir" && zip -r -q -9 "../../release-assets/${name}.zip" .)
          done

      - name: Set Release Body
        run: |
          KSU_VARIANT="${{ needs.fetch-commits.outputs.ksu_variant }}"
          cat << EOF > release_body.md
          ## AVD Kernels with ${KSU_VARIANT}

          Custom GKI kernels built for Android Virtual Device (AVD) with:
          - **${KSU_VARIANT}** — Kernel-based root solution
          - Virtual device modules included for AVD compatibility

          ### Architectures
          - \`x86_64\` — For standard AVD emulator on PC
          - \`aarch64\` — For ARM-based AVD or physical devices

          ### Usage (AVD)
          \`\`\`bash
          emulator @<avd-name> -kernel <path-to-bzImage-or-Image> -no-snapshot-load -show-kernel -writable-system
          \`\`\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type == 'Pre-Release' }}
          files: release-assets/*.zip
