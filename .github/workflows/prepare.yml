name: Prepare and Build

on:
  workflow_call:
    inputs:
      config_file:
        description: 'Path to the JSON config file'
        required: true
        type: string
      arch:
        description: 'Target architecture'
        required: true
        type: string
      ksu_commit:
        description: 'KernelSU-Next commit'
        required: false
        type: string
      susfs_commit:
        description: 'SUSFS commit map'
        required: false
        type: string
      enable_susfs:
        description: 'Enable SUSFS'
        required: false
        type: boolean
        default: true
      build_modules:
        description: 'Build virtual device modules'
        required: false
        type: boolean
        default: true

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Config and Generate Matrix
        id: set-matrix
        run: |
          echo "Reading config from ${{ inputs.config_file }}"
          if [ ! -f "${{ inputs.config_file }}" ]; then
            echo "Error: Config file not found: ${{ inputs.config_file }}"
            exit 1
          fi
          MATRIX_JSON=$(cat "${{ inputs.config_file }}" | jq -c .)
          echo "Matrix content: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}
      arch: ${{ inputs.arch }}
      ksu_commit: ${{ inputs.ksu_commit }}
      susfs_commit: ${{ inputs.susfs_commit }}
      enable_susfs: ${{ inputs.enable_susfs }}
      build_modules: ${{ inputs.build_modules }}
    secrets: inherit
